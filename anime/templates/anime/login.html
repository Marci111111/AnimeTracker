{% extends 'anime/base.html' %}
{% block title %}Login — AnimeTracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-4 col-lg-3">
        <div class="text-center mb-4">
            <div style="font-size:2.5rem;">🎌</div>
            <h4 class="fw-700 mt-2">Bentornato</h4>
            <p style="color:#64748b; font-size:0.875rem;">Accedi al tuo account AnimeTracker</p>
        </div>

        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Il tuo username" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Accedi</button>
            </form>
        </div>

        <p class="text-center mt-3" style="color:#64748b; font-size:0.875rem;">
            Non hai un account?
            <a href="{% url 'register' %}" style="color:#6366f1; font-weight:600; text-decoration:none;">Registrati</a>
        </p>
    </div>
</div>
{% endblock %}
